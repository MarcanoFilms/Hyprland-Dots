# Commands and Apps to be executed at launch

exec-once = kwalletd6
exec-once = swww-daemon
exec-once = bash -c 'sleep 2 && ~/.config/hypr/scripts/WallustSwww.sh ~/.config/hypr/wallpaper_effects/.wallpaper_current'
exec-once = /usr/lib/xdg-desktop-portal-hyprland
exec-once = bash -c 'sleep 1 && /usr/lib/xdg-desktop-portal --replace'
exec-once = eddie-ui
exec-once = bash -c 'sleep 10 && claude-desktop'

